<!doctype html>
<html dir="ltr" lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <meta name="description" content="Mockup." />

    <!-- TODO: Insert a concise, descriptive title that summarizes your page's content. -->
    <title>Site data upload CSV generator</title>

    <!-- GC Design System -->
    <link
      rel="stylesheet"
      href="https://cdn.design-system.alpha.canada.ca/@cdssnc/gcds-components@0.37.0/dist/gcds/gcds.css"
    />
    <script
      type="module"
      src="https://cdn.design-system.alpha.canada.ca/@cdssnc/gcds-components@0.37.0/dist/gcds/gcds.esm.js"
    ></script>
    <link
      rel="stylesheet"
      href="https://cdn.design-system.alpha.canada.ca/@cdssnc/gcds-utility@1.9.0/dist/gcds-utility.min.css"
    />
  </head>

  <body>
    <!---------- Header ---------->
    <!-- TODO: Modify the lang-href to set the language toggle's URL. -->
    <!-- TODO: Update the skip-to-href with the main content container's id. -->
    <gcds-header lang-href="#" skip-to-href="#main-content">
      <!-- The slot="search" attribute adds the search component to the header. -->
      <gcds-search slot="search"></gcds-search>

      <!-- The slot="breadcrumb" attribute adds the breadcrumbs component to the header. -->
      <gcds-breadcrumbs hide-canada-link="true" slot="breadcrumb">
        <!-- TODO: Adjust the breadcrumb links with the correct ones for your site. -->
        <gcds-breadcrumbs-item href="page4.html"
          >Site data upload CSV generator</gcds-breadcrumbs-item
        >
      </gcds-breadcrumbs>
    </gcds-header>

    <!---------- Main content ---------->
    <!-- TODO: Confirm the id matches the "skip-to-href" id in the header. -->
    <gcds-container
      id="main-content"
      main-container
      size="xl"
      centered
      tag="main"
    >
      <section>
        <gcds-heading tag="h1">Site data upload CSV generator</gcds-heading>

        <gcds-heading tag="h2">Step 1: Licence information</gcds-heading>

        <gcds-radios
          name="licence-type"
          id="licence-type"
          legend="Licence type"
          hint="The type of licence."
          required
          options='[
         { "label": "Terrestrial", "id": "licence-type-radio1", "value": "radio1"},
         { "label": "Satellite", "id": "licence-type-radio2", "value": "radio2"}
          ]'
        >
        </gcds-radios>
        <gcds-input
          input-id="licence-number"
          label="Spectrum licence number"
          hint="The 9 digit spectrum licence number for your site upload. Do not include the version number."
          required
          minlength="9"
          type="number"
        ></gcds-input>

        <gcds-input
          input-id="reference-number"
          label="Upload reference number"
          hint="A number, or any other text, for your own use. For example, Monthly upload, March 2023."
          maxlength="63"
        ></gcds-input>

        <gcds-input
          input-id="contact-name"
          label="Contact name"
          hint="Name of the person who may be contacted."
          maxlength="254"
          required
          type="text"
        ></gcds-input>

        <gcds-input
          input-id="business-number"
          label="Business telephone number"
          hint="Telephone number of the person who may be contacted."
          minlength="10"
          maxlength="254"
          required
          type="number"
        ></gcds-input>

        <gcds-input
          input-id="email-address"
          label="Email address"
          hint="Email address or addresses (separate with commas) of the person who may be contacted."
          maxlength="254"
          required
          type="email"
        ></gcds-input>

        <gcds-radios
          name="site-info-change"
          id="site-change"
          legend="Has there been any changes to your site information?"
          required
          options='[
         { "label": "My site information has changed since my last upload", "id": "site-change-radio1", "value": "radio1"},
         { "label": "My site information stayed the same since my last upload", "id": "site-change-radio2", "value": "radio2"},
         { "label": "I have not deployed any sites yet", "id": "site-change-radio3", "value": "radio3"},
         { "label": "I have decommissioned all my sites", "id": "site-change-radio4", "value": "radio4"}
          ]'
        >
        </gcds-radios>

        <gcds-button button-role="secondary" id="btn-go-back">
          Go back
        </gcds-button>
        <gcds-button id="btn-next"> Next </gcds-button>
      </section>

      <!-- TODO: Update the date to reflect the page's most recent change. -->
      <gcds-date-modified>2026-04-01</gcds-date-modified>
    </gcds-container>

    <!---------- Footer ---------->
    <!-- TODO: Update or remove the contextual footer heading and links as needed. -->
    <gcds-footer
      display="full"
      contextual-heading="Innovation, Science and Economic Development"
      contextual-links='{ "Contact us": "#"}'
    >
    </gcds-footer>

    <script type="module">
      import {
        setCurrentPage,
        saveCurrentPageData,
        loadCurrentPageData,
        validateCurrentPage,
        finalizeCurrentEntry,
        applyValidationToAllFields,
      } from "./scripts/site-data-upload-csv.js";

      setCurrentPage(1);
      loadCurrentPageData(1);
      applyValidationToAllFields();

      const nextBtn = document.getElementById("btn-next");
      const backBtn = document.getElementById("btn-go-back");
      const sitechange = document.getElementById("site-change");

      if (!nextBtn) {
        console.warn("Page1: Next button not found");
      }
      if (!backBtn) {
        console.warn("Page1: Go back button not found");
      }

      function getSiteChangeValue() {
        if (!sitechange) return "";
        return (
          sitechange.value ||
          sitechange.querySelector('input[type="radio"]:checked')?.value ||
          sitechange.shadowRoot?.querySelector('input[type="radio"]:checked')
            ?.value ||
          ""
        );
      }

      function applyOptionalLabelToReferenceNumber() {
        const referenceField = document.querySelector(
          'gcds-input[input-id="reference-number"]',
        );
        if (!referenceField) return;

        const applyOptional = () => {
          const label = referenceField.shadowRoot?.querySelector(
            "label.gcds-label",
          );
          if (!label) return false;
          if (label.querySelector(".label--optional")) return true;

          const optionalSpan = document.createElement("span");
          optionalSpan.className = "label--required label--optional";
          optionalSpan.setAttribute("aria-hidden", "true");
          optionalSpan.textContent = "(optional)";
          label.appendChild(optionalSpan);
          return true;
        };

        if (applyOptional()) return;

        let attempts = 0;
        const timer = setInterval(() => {
          attempts += 1;
          if (applyOptional() || attempts >= 20) {
            clearInterval(timer);
          }
        }, 100);
      }

      function handleNext() {
        const selected = getSiteChangeValue();

        const shouldFinalize =
          selected === "radio2" ||
          selected === "radio3" ||
          selected === "radio4";
        const isValid = validateCurrentPage();
        if (!isValid) return;

        saveCurrentPageData();

        if (shouldFinalize) {
          finalizeCurrentEntry();
          window.location.href = "page4.html";
          return;
        }

        window.location.href = "page2.html";
      }

      function handleBack() {
        window.location.href = "page4.html";
      }

      nextBtn?.addEventListener("click", (event) => {
        event.preventDefault();
        handleNext();
      });

      backBtn?.addEventListener("click", (event) => {
        event.preventDefault();
        handleBack();
      });

      document.addEventListener("pointerup", (event) => {
        const path = event.composedPath ? event.composedPath() : [event.target];
        for (const node of path) {
          if (!(node instanceof Element)) continue;
          if (node === nextBtn || node === backBtn) continue;
          if (node.id === "btn-next" || node.closest?.("#btn-next")) {
            event.preventDefault();
            handleNext();
            return;
          }
          if (node.id === "btn-go-back" || node.closest?.("#btn-go-back")) {
            event.preventDefault();
            handleBack();
            return;
          }
        }
      });

      applyOptionalLabelToReferenceNumber();
    </script>
  </body>
</html>
