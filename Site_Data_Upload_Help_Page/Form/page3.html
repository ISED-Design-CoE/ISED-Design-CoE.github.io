<!doctype html>
<html dir="ltr" lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <meta name="description" content="Mockup." />

    <!-- TODO: Insert a concise, descriptive title that summarizes your page's content. -->
    <title>Site data upload CSV generator</title>

    <!-- GC Design System -->
    <link
      rel="stylesheet"
      href="https://cdn.design-system.alpha.canada.ca/@cdssnc/gcds-components@0.37.0/dist/gcds/gcds.css"
    />
    <script
      type="module"
      src="https://cdn.design-system.alpha.canada.ca/@cdssnc/gcds-components@0.37.0/dist/gcds/gcds.esm.js"
    ></script>
    <link
      rel="stylesheet"
      href="https://cdn.design-system.alpha.canada.ca/@cdssnc/gcds-utility@1.9.0/dist/gcds-utility.min.css"
    />
  </head>

  <body>
    <!---------- Header ---------->
    <!-- TODO: Modify the lang-href to set the language toggle's URL. -->
    <!-- TODO: Update the skip-to-href with the main content container's id. -->
    <gcds-header lang-href="#" skip-to-href="#main-content">
      <!-- The slot="search" attribute adds the search component to the header. -->
      <gcds-search slot="search"></gcds-search>

      <!-- The slot="breadcrumb" attribute adds the breadcrumbs component to the header. -->
      <gcds-breadcrumbs hide-canada-link="true" slot="breadcrumb">
        <!-- TODO: Adjust the breadcrumb links with the correct ones for your site. -->
        <gcds-breadcrumbs-item href="index.html"
          >Site data upload CSV generator</gcds-breadcrumbs-item
        >
      </gcds-breadcrumbs>
    </gcds-header>

    <!---------- Main content ---------->
    <!-- TODO: Confirm the id matches the "skip-to-href" id in the header. -->
    <gcds-container
      id="main-content"
      main-container
      size="xl"
      centered
      tag="main"
    >
      <section>
        <gcds-heading tag="h1">Site data upload CSV generator</gcds-heading>

        <gcds-heading tag="h2">Step 3: Antenna information</gcds-heading>

        <gcds-input
          input-id="radio-model"
          label="Radio model number"
          hint="The radio’s Hardware Version Identification Number (HVIN) certified by ISED. "
          required
          maxlength="128"
        ></gcds-input>

        <gcds-input
          input-id="radio-code"
          label="Radio manufacturer code"
          hint="The company code assigned by ISED’s Certification and Engineering Bureau (CEB) to the manufacturer of the radio."
          required
        ></gcds-input>

        <gcds-input
          input-id="radio-certificate"
          label="Radio certification number"
          hint="Enter your radio certification number assigned by ISED."
          required
          maxlength="31"
        ></gcds-input>

        <gcds-input
          input-id="bandwidth"
          label="Bandwidth"
          hint="The occupied bandwidth in KHz of the emission signal."
          required
          min="0.10"
          max="50000.00"
          type="number"
        ></gcds-input>

        <gcds-input
          input-id="tcp"
          label="Transmitter TCP-TRP"
          hint="The Total Radiated Power (TRP) or Total Conducted Power (TCP) in dBm. "
          required
        ></gcds-input>

        <gcds-input
          input-id="downlink"
          label="Downlink resource allocation"
          hint="The percentage of time transmitting."
          required
          min="1"
          max="100"
          maxlength="3"
          type="number"
        ></gcds-input>

        <gcds-radios
          name="antenna-type"
          id="antenna-type"
          legend="Is your antenna transmitting or receiving?"
          required
          options='[
         { "label": "Transmitting only", "id": "radio1", "value": "radio1"},
         { "label": "Receiving only", "id": "radio2", "value": "radio2"}, 
         { "label": "Both transmitting and receiving", "id": "radio3", "value": "radio3"}
          ]'
        >
        </gcds-radios>

        <div id="channel-frequency-tx" hidden>
          <gcds-input
            input-id="tx-channel-frequency"
            label="Tx channel frequency"
            hint="The centre frequency in MHz, of the occupied bandwidth for the given antenna installation."
            required
            maxlength="8"
          ></gcds-input>
        </div>

        <div id="channel-frequency-rx" hidden>
          <gcds-input
            input-id="rx-channel-frequency"
            label="Rx channel frequency"
            hint="The centre frequency in MHz, of the occupied bandwidth for the given antenna installation."
            required
            maxlength="8"
          ></gcds-input>
        </div>

        <div id="type-code-tx" hidden>
          <gcds-select
            select-id="tx-type-code"
            label="Tx antenna type code"
            name="Antenna type code"
            hint="Select the type of antenna associated with a transmitting radio installation."
            required
            default-value="Select option"
          >
            <option value="1">Active antenna systems</option>
            <option value="2">Non-AAS correlated</option>
            <option value="3">Non-AAS uncorrelated</option>
          </gcds-select>
        </div>

        <div id="type-code-rx" hidden>
          <gcds-select
            select-id="rx-type-code"
            label="Rx antenna type code"
            name="Antenna type code"
            hint="Select the type of antenna associated with a receiving radio installation."
            required
            default-value="Select option"
          >
            <option value="1">Active antenna systems</option>
            <option value="2">Non-AAS correlated</option>
            <option value="3">Non-AAS uncorrelated</option>
          </gcds-select>
        </div>

        <div id="number-antennas-tx" hidden>
          <gcds-input
            input-id="tx-number-antennas"
            label="Total number of Tx antennas"
            hint="The total number of antennas physically installed at the site."
            required
            type="number"
            min="1"
          ></gcds-input>
        </div>

        <div id="number-antennas-rx" hidden>
          <gcds-input
            input-id="rx-number-antennas"
            label="Total number of Rx antennas"
            hint="The total number of antennas physically installed at the site."
            required
            type="number"
            min="1"
          ></gcds-input>
        </div>

        <div id="antenna-model-tx" hidden>
          <gcds-input
            input-id="tx-antenna-model"
            label="Tx antenna model number"
            hint="The antenna model number."
            required
            minlength="0"
            maxlength="80"
          ></gcds-input>
        </div>

        <div id="antenna-model-rx" hidden>
          <gcds-input
            input-id="rx-antenna-model"
            label="Rx antenna model number"
            hint="The antenna model number."
            required
            minlength="0"
            maxlength="80"
          ></gcds-input>
        </div>

        <div id="antenna-manufacturer-tx" hidden>
          <gcds-input
            input-id="tx-antenna-manufacturer"
            label="Tx antenna manufacturer"
            hint="The manufacturer name of the antenna."
            required
            minlength="0"
            maxlength="255"
          ></gcds-input>
        </div>

        <div id="antenna-manufacturer-rx" hidden>
          <gcds-input
            input-id="rx-antenna-manufacturer"
            label="Rx antenna manufacturer"
            hint="The manufacturer name of the antenna."
            required
            minlength="0"
            maxlength="255"
          ></gcds-input>
        </div>

        <div id="antenna-height-tx" hidden>
          <gcds-input
            input-id="tx-antenna-height"
            label="Tx antenna height"
            hint="The antenna height in meters from ground level."
            required
            type="number"
          ></gcds-input>
        </div>

        <div id="antenna-height-rx" hidden>
          <gcds-input
            input-id="rx-antenna-height"
            label="Rx antenna height"
            hint="The antenna height in meters from ground level."
            required
            type="number"
          ></gcds-input>
        </div>

        <div id="omnidirectional-pattern-tx" hidden>
          <gcds-select
            select-id="tx-omnidirectional-pattern"
            label="Tx antenna omnidirectional pattern indicator"
            hint="Select the directional pattern for your antenna."
            name="Antenna omnidirectional pattern indicator"
            required
            default-value="Select option"
          >
            <option value="1">Directional</option>
            <option value="2">Non-directional</option>
          </gcds-select>
        </div>

        <div id="omnidirectional-pattern-rx" hidden>
          <gcds-select
            select-id="rx-omnidirectional-pattern"
            label="Rx antenna omnidirectional pattern indicator"
            hint="Select the directional pattern for your antenna."
            name="Antenna omnidirectional pattern indicator"
            required
            default-value="Select option"
          >
            <option value="1">Directional</option>
            <option value="2">Non-directional</option>
          </gcds-select>
        </div>

        <div id="antenna-horizontal-beamwidth-tx" hidden>
          <gcds-input
            input-id="tx-antenna-horizontal-beamwidth"
            label="Tx antenna horizontal beamwidth"
            hint="Enter your antenna horizontal beamwidth in degrees."
            required
            min="1"
            max="359.9"
            type="number"
          ></gcds-input>
        </div>

        <div id="antenna-horizontal-beamwidth-rx" hidden>
          <gcds-input
            input-id="rx-antenna-horizontal-beamwidth"
            label="Rx antenna horizontal beamwidth"
            hint="Enter your antenna horizontal beamwidth in degrees."
            required
            min="1"
            max="359.9"
            type="number"
          ></gcds-input>
        </div>

        <div id="antenna-vertical-beamwidth-tx" hidden>
          <gcds-input
            input-id="tx-antenna-vertical-beamwidth"
            label="Tx antenna vertical beamwidth"
            required
            min="1"
            max="359.9"
            type="number"
          ></gcds-input>
        </div>

        <div id="antenna-vertical-beamwidth-rx" hidden>
          <gcds-input
            input-id="rx-antenna-vertical-beamwidth"
            label="Rx antenna vertical beamwidth"
            required
            min="1"
            max="359.9"
            type="number"
          ></gcds-input>
        </div>

        <div id="antenna-azimuth-tx" hidden>
          <gcds-input
            input-id="tx-antenna-azimuth"
            label="Tx antenna azimuth"
            required
            min="1"
            max="359.9"
            type="number"
          ></gcds-input>
        </div>

        <div id="antenna-azimuth-rx" hidden>
          <gcds-input
            input-id="rx-antenna-azimuth"
            label="Rx antenna azimuth"
            required
            min="1"
            max="359.9"
            type="number"
          ></gcds-input>
        </div>

        <div id="antenna-elevation-angle-tx" hidden>
          <gcds-input
            input-id="tx-antenna-elevation-angle"
            label="Tx antenna elevation angle"
            required
            min="-90"
            max="90"
            type="number"
          ></gcds-input>
        </div>

        <div id="antenna-elevation-angle-rx" hidden>
          <gcds-input
            input-id="rx-antenna-elevation-angle"
            label="Rx antenna elevation angle"
            required
            min="-90"
            max="90"
            type="number"
          ></gcds-input>
        </div>

        <div id="antenna-gain-tx" hidden>
          <gcds-input
            input-id="tx-antenna-gain"
            label="Tx antenna gain"
            required
            min="0"
            max="70"
            type="number"
          ></gcds-input>
        </div>

        <div id="antenna-gain-rx" hidden>
          <gcds-input
            input-id="rx-antenna-gain"
            label="Rx antenna gain"
            required
            min="0"
            max="70"
            type="number"
          ></gcds-input>
        </div>

        <div id="antenna-line-loss-tx" hidden>
          <gcds-input
            input-id="tx-antenna-line-loss"
            label="Tx antenna line loss"
            required
            min="0"
            max="30"
            type="number"
          ></gcds-input>
        </div>

        <div id="antenna-line-loss-rx" hidden>
          <gcds-input
            input-id="rx-antenna-line-loss"
            label="Rx antenna line loss"
            required
            min="0"
            max="30"
            type="number"
          ></gcds-input>
        </div>

        <gcds-button button-role="secondary" id="btn-go-back">
          Go back
        </gcds-button>
        <gcds-button id="btn-next"> Next </gcds-button>
      </section>

      <!-- TODO: Update the date to reflect the page's most recent change. -->
      <gcds-date-modified>2026-04-01</gcds-date-modified>
    </gcds-container>

    <!---------- Footer ---------->
    <!-- TODO: Update or remove the contextual footer heading and links as needed. -->
    <gcds-footer
      display="full"
      contextual-heading="Innovation, Science and Economic Development"
      contextual-links='{ "Contact us": "#"}'
    >
    </gcds-footer>

    <script type="module">
      import {
        setCurrentPage,
        saveCurrentPageData,
        loadCurrentPageData,
        finalizeCurrentEntry,
        validateCurrentPage,
        applyValidationToAllFields,
      } from "./scripts/site-data-upload-csv.js";

      setCurrentPage(3);
      loadCurrentPageData(3);
      applyValidationToAllFields();

      const nextBtn = document.getElementById("btn-next");
      const backBtn = document.getElementById("btn-go-back");

      nextBtn?.addEventListener("click", (event) => {
        event.preventDefault();
        if (!validateCurrentPage()) return;
        saveCurrentPageData();
        finalizeCurrentEntry();

        window.location.href = "page4.html";
      });

      backBtn?.addEventListener("click", (event) => {
        event.preventDefault();
        saveCurrentPageData();
        window.location.href = "page2.html";
      });
      document.addEventListener("pointerup", (event) => {
        const path = event.composedPath ? event.composedPath() : [event.target];
        for (const node of path) {
          if (!(node instanceof Element)) continue;
          if (node === nextBtn || node === backBtn) continue;
          if (node.id === "btn-next" || node.closest?.("#btn-next")) {
            event.preventDefault();
            if (!validateCurrentPage()) return;
            saveCurrentPageData();
            window.location.href = "page4.html";
            return;
          }
          if (node.id === "btn-go-back" || node.closest?.("#btn-go-back")) {
            event.preventDefault();
            saveCurrentPageData();
            window.location.href = "page2.html";
            return;
          }
        }
      });

      document.addEventListener("DOMContentLoaded", () => {
        const radios = document.getElementById("antenna-type");

        function updateInputs() {
          const value = radios.value;

          // Hide everything first
          document
            .querySelectorAll('div[id$="Tx"], div[id$="Rx"]')
            .forEach((div) => {
              div.hidden = true;
            });

          if (value === "radio1") {
            document.querySelectorAll('div[id$="tx"]').forEach((div) => {
              div.hidden = false;
            });
            document.querySelectorAll('div[id$="rx"]').forEach((div) => {
              div.hidden = true;
              div
                .querySelectorAll("gcds-input, gcds-select")
                .forEach((field) => {
                  field.removeAttribute("required");
                });
            });
          } else if (value === "radio2") {
            document.querySelectorAll('div[id$="rx"]').forEach((div) => {
              div.hidden = false;
            });
            document.querySelectorAll('div[id$="tx"]').forEach((div) => {
              div.hidden = true;
              div
                .querySelectorAll("gcds-input, gcds-select")
                .forEach((field) => {
                  field.removeAttribute("required");
                });
            });
          } else if (value === "radio3") {
            document
              .querySelectorAll('div[id$="tx"], div[id$="rx"]')
              .forEach((div) => {
                div.hidden = false;
              });
          }
        }

        updateInputs();

        radios.addEventListener("change", updateInputs);
      });
    </script>
  </body>
</html>

field.removeAttribute("required");
