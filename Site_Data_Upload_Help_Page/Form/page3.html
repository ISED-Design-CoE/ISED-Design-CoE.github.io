<!doctype html>
<html dir="ltr" lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <meta name="description" content="Mockup." />

    <!-- TODO: Insert a concise, descriptive title that summarizes your page's content. -->
    <title>Site data upload CSV generator</title>

    <!-- GC Design System -->
    <link
      rel="stylesheet"
      href="https://cdn.design-system.alpha.canada.ca/@cdssnc/gcds-components@0.37.0/dist/gcds/gcds.css"
    />
    <script
      type="module"
      src="https://cdn.design-system.alpha.canada.ca/@cdssnc/gcds-components@0.37.0/dist/gcds/gcds.esm.js"
    ></script>
    <link
      rel="stylesheet"
      href="https://cdn.design-system.alpha.canada.ca/@cdssnc/gcds-utility@1.9.0/dist/gcds-utility.min.css"
    />
  </head>

  <body>
    <!---------- Header ---------->
    <!-- TODO: Modify the lang-href to set the language toggle's URL. -->
    <!-- TODO: Update the skip-to-href with the main content container's id. -->
    <gcds-header lang-href="#" skip-to-href="#main-content">
      <!-- The slot="search" attribute adds the search component to the header. -->
      <gcds-search slot="search"></gcds-search>

      <!-- The slot="breadcrumb" attribute adds the breadcrumbs component to the header. -->
      <gcds-breadcrumbs hide-canada-link="true" slot="breadcrumb">
        <!-- TODO: Adjust the breadcrumb links with the correct ones for your site. -->
        <gcds-breadcrumbs-item href="index.html"
          >Site data upload CSV generator</gcds-breadcrumbs-item
        >
      </gcds-breadcrumbs>
    </gcds-header>

    <!---------- Main content ---------->
    <!-- TODO: Confirm the id matches the "skip-to-href" id in the header. -->
    <gcds-container
      id="main-content"
      main-container
      size="xl"
      centered
      tag="main"
    >
      <section>
        <gcds-heading tag="h1">Site data upload CSV generator</gcds-heading>

        <gcds-heading tag="h2">Step 3: Antenna information</gcds-heading>

        <gcds-input
          input-id="tx-radio-model"
          label="Tx radio model number"
          hint="The transmitter radio Hardware Version Identification Number (HVIN) certified by ISED."
          required
          maxlength="128"
        ></gcds-input>

        <gcds-input
          input-id="rx-radio-model"
          label="Rx radio model number"
          hint="The receiver radio Hardware Version Identification Number (HVIN) certified by ISED."
          required
          maxlength="128"
        ></gcds-input>

        <gcds-input
          input-id="tx-radio-code"
          label="Tx radio manufacturer code"
          hint="The company code assigned by ISED’s Certification and Engineering Bureau (CEB) to the manufacturer of the transmitter radio."
          required
        ></gcds-input>

        <gcds-input
          input-id="rx-radio-code"
          label="Rx radio manufacturer code"
          hint="The company code assigned by ISED’s Certification and Engineering Bureau (CEB) to the manufacturer of the receiver radio."
          required
        ></gcds-input>

        <gcds-input
          input-id="tx-radio-certificate"
          label="Tx radio certification number"
          hint="Enter the radio certification number assigned by ISED for the transmitter radio."
          required
          maxlength="31"
        ></gcds-input>

        <gcds-input
          input-id="rx-radio-certificate"
          label="Rx radio certification number"
          hint="Enter the radio certification number assigned by ISED for the receiver radio."
          required
          maxlength="31"
        ></gcds-input>

        <gcds-input
          input-id="bandwidth"
          label="Bandwidth"
          hint="The occupied bandwidth in KHz of the emission signal."
          required
          min="0.10"
          max="50000.00"
          type="number"
        ></gcds-input>

        <gcds-input
          input-id="tcp"
          label="Transmitter TCP-TRP"
          hint="The Total Radiated Power (TRP) or Total Conducted Power (TCP) in dBm. "
          required
        ></gcds-input>

        <gcds-input
          input-id="downlink"
          label="Downlink resource allocation"
          hint="The percentage of time transmitting."
          required
          min="1"
          max="100"
          maxlength="3"
          type="number"
        ></gcds-input>

        <gcds-radios
          name="antenna-type"
          id="antenna-type"
          legend="Is your antenna transmitting or receiving?"
          required
          options='[
         { "label": "Transmitting only", "id": "antenna-type-radio1", "value": "radio1"},
         { "label": "Receiving only", "id": "antenna-type-radio2", "value": "radio2"}, 
         { "label": "Both transmitting and receiving", "id": "antenna-type-radio3", "value": "radio3"}
          ]'
        >
        </gcds-radios>

        <div id="channel-frequency-tx" hidden>
          <gcds-input
            input-id="tx-channel-frequency"
            label="Tx channel frequency"
            hint="The centre frequency in MHz, of the occupied bandwidth for the given antenna installation."
            required
            maxlength="8"
          ></gcds-input>
        </div>

        <div id="channel-frequency-rx" hidden>
          <gcds-input
            input-id="rx-channel-frequency"
            label="Rx channel frequency"
            hint="The centre frequency in MHz, of the occupied bandwidth for the given antenna installation."
            required
            maxlength="8"
          ></gcds-input>
        </div>

        <div id="type-code-tx" hidden>
          <gcds-select
            select-id="tx-type-code"
            label="Tx antenna type code"
            name="Antenna type code"
            hint="Select the type of antenna associated with a transmitting radio installation."
            required
            default-value="Select option"
          >
            <option value="1">Active antenna systems</option>
            <option value="2">Non-AAS correlated</option>
            <option value="3">Non-AAS uncorrelated</option>
          </gcds-select>
        </div>

        <div id="type-code-rx" hidden>
          <gcds-select
            select-id="rx-type-code"
            label="Rx antenna type code"
            name="Antenna type code"
            hint="Select the type of antenna associated with a receiving radio installation."
            required
            default-value="Select option"
          >
            <option value="1">Active antenna systems</option>
            <option value="2">Non-AAS correlated</option>
            <option value="3">Non-AAS uncorrelated</option>
          </gcds-select>
        </div>

        <div id="number-antennas-tx" hidden>
          <gcds-input
            input-id="tx-number-antennas"
            label="Total number of Tx antennas"
            hint="The total number of antennas physically installed at the site."
            required
            type="number"
            min="1"
          ></gcds-input>
        </div>

        <div id="number-antennas-rx" hidden>
          <gcds-input
            input-id="rx-number-antennas"
            label="Total number of Rx antennas"
            hint="The total number of antennas physically installed at the site."
            required
            type="number"
            min="1"
          ></gcds-input>
        </div>

        <div id="antenna-model-tx" hidden>
          <gcds-input
            input-id="tx-antenna-model"
            label="Tx antenna model number"
            hint="The antenna model number."
            required
            minlength="0"
            maxlength="80"
          ></gcds-input>
        </div>

        <div id="antenna-model-rx" hidden>
          <gcds-input
            input-id="rx-antenna-model"
            label="Rx antenna model number"
            hint="The antenna model number."
            required
            minlength="0"
            maxlength="80"
          ></gcds-input>
        </div>

        <div id="antenna-manufacturer-tx" hidden>
          <gcds-input
            input-id="tx-antenna-manufacturer"
            label="Tx antenna manufacturer"
            hint="The manufacturer name of the antenna."
            required
            minlength="0"
            maxlength="255"
          ></gcds-input>
        </div>

        <div id="antenna-manufacturer-rx" hidden>
          <gcds-input
            input-id="rx-antenna-manufacturer"
            label="Rx antenna manufacturer"
            hint="The manufacturer name of the antenna."
            required
            minlength="0"
            maxlength="255"
          ></gcds-input>
        </div>

        <div id="antenna-height-tx" hidden>
          <gcds-input
            input-id="tx-antenna-height"
            label="Tx antenna height"
            hint="The antenna height in meters from ground level."
            required
            type="number"
          ></gcds-input>
        </div>

        <div id="antenna-height-rx" hidden>
          <gcds-input
            input-id="rx-antenna-height"
            label="Rx antenna height"
            hint="The antenna height in meters from ground level."
            required
            type="number"
          ></gcds-input>
        </div>

        <div id="omnidirectional-pattern-tx" hidden>
          <gcds-select
            select-id="tx-omnidirectional-pattern"
            label="Tx antenna omnidirectional pattern indicator"
            hint="Select the directional pattern for your antenna."
            name="Antenna omnidirectional pattern indicator"
            required
            default-value="Select option"
          >
            <option value="1">Directional</option>
            <option value="2">Non-directional</option>
          </gcds-select>
        </div>

        <div id="omnidirectional-pattern-rx" hidden>
          <gcds-select
            select-id="rx-omnidirectional-pattern"
            label="Rx antenna omnidirectional pattern indicator"
            hint="Select the directional pattern for your antenna."
            name="Antenna omnidirectional pattern indicator"
            required
            default-value="Select option"
          >
            <option value="1">Directional</option>
            <option value="2">Non-directional</option>
          </gcds-select>
        </div>

        <div id="antenna-horizontal-beamwidth-tx" hidden>
          <gcds-input
            input-id="tx-antenna-horizontal-beamwidth"
            label="Tx antenna horizontal beamwidth"
            hint="Enter your antenna horizontal beamwidth in degrees."
            required
            min="1"
            max="359.9"
            type="number"
          ></gcds-input>
        </div>

        <div id="antenna-horizontal-beamwidth-rx" hidden>
          <gcds-input
            input-id="rx-antenna-horizontal-beamwidth"
            label="Rx antenna horizontal beamwidth"
            hint="Enter your antenna horizontal beamwidth in degrees."
            required
            min="1"
            max="359.9"
            type="number"
          ></gcds-input>
        </div>

        <div id="antenna-vertical-beamwidth-tx" hidden>
          <gcds-input
            input-id="tx-antenna-vertical-beamwidth"
            label="Tx antenna vertical beamwidth"
            required
            min="1"
            max="359.9"
            type="number"
          ></gcds-input>
        </div>

        <div id="antenna-vertical-beamwidth-rx" hidden>
          <gcds-input
            input-id="rx-antenna-vertical-beamwidth"
            label="Rx antenna vertical beamwidth"
            required
            min="1"
            max="359.9"
            type="number"
          ></gcds-input>
        </div>

        <div id="antenna-azimuth-tx" hidden>
          <gcds-input
            input-id="tx-antenna-azimuth"
            label="Tx antenna azimuth"
            required
            min="1"
            max="359.9"
            type="number"
          ></gcds-input>
        </div>

        <div id="antenna-azimuth-rx" hidden>
          <gcds-input
            input-id="rx-antenna-azimuth"
            label="Rx antenna azimuth"
            required
            min="1"
            max="359.9"
            type="number"
          ></gcds-input>
        </div>

        <div id="antenna-elevation-angle-tx" hidden>
          <gcds-input
            input-id="tx-antenna-elevation-angle"
            label="Tx antenna elevation angle"
            required
            min="-90"
            max="90"
            type="number"
          ></gcds-input>
        </div>

        <div id="antenna-elevation-angle-rx" hidden>
          <gcds-input
            input-id="rx-antenna-elevation-angle"
            label="Rx antenna elevation angle"
            required
            min="-90"
            max="90"
            type="number"
          ></gcds-input>
        </div>

        <div id="antenna-gain-tx" hidden>
          <gcds-input
            input-id="tx-antenna-gain"
            label="Tx antenna gain"
            required
            min="0"
            max="70"
            type="number"
          ></gcds-input>
        </div>

        <div id="antenna-gain-rx" hidden>
          <gcds-input
            input-id="rx-antenna-gain"
            label="Rx antenna gain"
            required
            min="0"
            max="70"
            type="number"
          ></gcds-input>
        </div>

        <div id="antenna-line-loss-tx" hidden>
          <gcds-input
            input-id="tx-antenna-line-loss"
            label="Tx antenna line loss"
            required
            min="0"
            max="30"
            type="number"
          ></gcds-input>
        </div>

        <div id="antenna-line-loss-rx" hidden>
          <gcds-input
            input-id="rx-antenna-line-loss"
            label="Rx antenna line loss"
            required
            min="0"
            max="30"
            type="number"
          ></gcds-input>
        </div>

        <gcds-button button-role="secondary" id="btn-go-back">
          Go back
        </gcds-button>
        <gcds-button id="btn-next"> Next </gcds-button>
      </section>

      <!-- TODO: Update the date to reflect the page's most recent change. -->
      <gcds-date-modified>2026-04-01</gcds-date-modified>
    </gcds-container>

    <!---------- Footer ---------->
    <!-- TODO: Update or remove the contextual footer heading and links as needed. -->
    <gcds-footer
      display="full"
      contextual-heading="Innovation, Science and Economic Development"
      contextual-links='{ "Contact us": "#"}'
    >
    </gcds-footer>

    <script type="module">
      import {
        setCurrentPage,
        saveCurrentPageData,
        loadCurrentPageData,
        finalizeCurrentEntry,
        validateCurrentPage,
        applyValidationToAllFields,
      } from "./scripts/site-data-upload-csv.js";

      setCurrentPage(3);
      loadCurrentPageData(3);
      applyValidationToAllFields();

      const nextBtn = document.getElementById("btn-next");
      const backBtn = document.getElementById("btn-go-back");
      let isNavigating = false;

      function handleNext() {
        if (isNavigating) return;
        if (!validateCurrentPage()) return;
        isNavigating = true;
        saveCurrentPageData();
        finalizeCurrentEntry();
        window.location.href = "page4.html";
      }

      function handleBack() {
        if (isNavigating) return;
        isNavigating = true;
        saveCurrentPageData();
        window.location.href = "page2.html";
      }

      nextBtn?.addEventListener("click", (event) => {
        event.preventDefault();
        handleNext();
      });

      backBtn?.addEventListener("click", (event) => {
        event.preventDefault();
        handleBack();
      });

      document.addEventListener("pointerup", (event) => {
        const path = event.composedPath ? event.composedPath() : [event.target];
        for (const node of path) {
          if (!(node instanceof Element)) continue;
          if (node === nextBtn || node === backBtn) continue;
          if (node.id === "btn-next" || node.closest?.("#btn-next")) {
            event.preventDefault();
            handleNext();
            return;
          }
          if (node.id === "btn-go-back" || node.closest?.("#btn-go-back")) {
            event.preventDefault();
            handleBack();
            return;
          }
        }
      });

      document.addEventListener("DOMContentLoaded", () => {
        const radios = document.getElementById("antenna-type");

        if (!radios) return;

        function getLicenceTypeFromState() {
          try {
            const raw = sessionStorage.getItem("site-data-upload-all") || "{}";
            const state = JSON.parse(raw) || {};
            const currentPage1 = state.current?.page1 || {};
            if (currentPage1["licence-type"])
              return currentPage1["licence-type"];
            if (currentPage1.licenceType) return currentPage1.licenceType;

            const editingIndex = state.editing;
            const entries = Array.isArray(state.entries) ? state.entries : [];
            if (
              Number.isInteger(editingIndex) &&
              editingIndex >= 0 &&
              entries[editingIndex]
            ) {
              return (
                entries[editingIndex]["licence-type"] ||
                entries[editingIndex].licenceType ||
                ""
              );
            }

            return "";
          } catch (error) {
            console.warn("Page3: Unable to read stored licence type", error);
            return "";
          }
        }

        function getInnerField(el, selector) {
          if (!el) return null;
          return (
            el.querySelector(selector) || el.shadowRoot?.querySelector(selector)
          );
        }

        function setFieldValue(field, value) {
          if (!field) return;
          field.value = value;
          const inner = getInnerField(field, "input, select, textarea");
          if (inner) inner.value = value;
        }

        function setFieldRequired(field, required) {
          if (!field) return;
          const wasRequired = field.dataset.originalRequired === "true";
          if (required && wasRequired) {
            field.setAttribute("required", "");
          } else {
            field.removeAttribute("required");
            field.removeAttribute("error-state");
            field.removeAttribute("error-message");
          }
        }

        function setFieldHidden(field, hidden) {
          if (!field) return;
          field.hidden = hidden;
          field.style.display = hidden ? "none" : "";
          setFieldRequired(field, !hidden);
        }

        function setWrapperHidden(wrapper, hidden) {
          if (!wrapper) return;
          wrapper.hidden = hidden;
          wrapper.style.display = hidden ? "none" : "";
          wrapper
            .querySelectorAll("gcds-input, gcds-select")
            .forEach((field) => {
              setFieldRequired(field, !hidden);
            });
        }

        document
          .querySelectorAll("gcds-input, gcds-select")
          .forEach((field) => {
            field.dataset.originalRequired = String(
              field.hasAttribute("required"),
            );
          });

        function getSelectedAntennaType() {
          return (
            radios.value ||
            radios.querySelector('input[type="radio"]:checked')?.value ||
            radios.shadowRoot?.querySelector('input[type="radio"]:checked')
              ?.value ||
            ""
          );
        }

        function setSectionVisible(selector, visible) {
          document.querySelectorAll(selector).forEach((section) => {
            section.dataset.sectionVisible = String(visible);
            section.hidden = !visible;
            section
              .querySelectorAll("gcds-input, gcds-select")
              .forEach((field) => {
                setFieldRequired(field, visible);
              });
          });
        }

        function syncChannelFrequencyDefaults(antennaType) {
          const txChannelFrequency = document.querySelector(
            'gcds-input[input-id="tx-channel-frequency"]',
          );
          const rxChannelFrequency = document.querySelector(
            'gcds-input[input-id="rx-channel-frequency"]',
          );

          if (antennaType === "radio1") {
            setFieldValue(rxChannelFrequency, "0");
          } else if (antennaType === "radio2") {
            setFieldValue(txChannelFrequency, "0");
          }
        }

        function applySatelliteOverrides() {
          const isSatellite = getLicenceTypeFromState() === "radio2";

          const txRadioCode = document.querySelector(
            'gcds-input[input-id="tx-radio-code"]',
          );
          const rxRadioCode = document.querySelector(
            'gcds-input[input-id="rx-radio-code"]',
          );
          const txRadioCertificate = document.querySelector(
            'gcds-input[input-id="tx-radio-certificate"]',
          );
          const rxRadioCertificate = document.querySelector(
            'gcds-input[input-id="rx-radio-certificate"]',
          );
          const txTypeCodeWrap = document.getElementById("type-code-tx");
          const rxTypeCodeWrap = document.getElementById("type-code-rx");
          const txTypeCode = document.querySelector(
            'gcds-select[select-id="tx-type-code"]',
          );
          const rxTypeCode = document.querySelector(
            'gcds-select[select-id="rx-type-code"]',
          );
          const txManufacturerWrap = document.getElementById(
            "antenna-manufacturer-tx",
          );
          const rxManufacturerWrap = document.getElementById(
            "antenna-manufacturer-rx",
          );
          const txManufacturer = document.querySelector(
            'gcds-input[input-id="tx-antenna-manufacturer"]',
          );
          const rxManufacturer = document.querySelector(
            'gcds-input[input-id="rx-antenna-manufacturer"]',
          );

          if (isSatellite) {
            setFieldValue(txRadioCode, "31913");
            setFieldValue(rxRadioCode, "31913");
            setFieldValue(txRadioCertificate, "Exempt");
            setFieldValue(rxRadioCertificate, "Exempt");
            setFieldValue(txTypeCode, "");
            setFieldValue(rxTypeCode, "");
            setFieldValue(txManufacturer, "");
            setFieldValue(rxManufacturer, "");
          }

          setFieldHidden(txRadioCode, isSatellite);
          setFieldHidden(rxRadioCode, isSatellite);
          setFieldHidden(txRadioCertificate, isSatellite);
          setFieldHidden(rxRadioCertificate, isSatellite);
          setWrapperHidden(
            txTypeCodeWrap,
            isSatellite || txTypeCodeWrap?.dataset.sectionVisible !== "true",
          );
          setWrapperHidden(
            rxTypeCodeWrap,
            isSatellite || rxTypeCodeWrap?.dataset.sectionVisible !== "true",
          );
          setWrapperHidden(
            txManufacturerWrap,
            isSatellite ||
              txManufacturerWrap?.dataset.sectionVisible !== "true",
          );
          setWrapperHidden(
            rxManufacturerWrap,
            isSatellite ||
              rxManufacturerWrap?.dataset.sectionVisible !== "true",
          );
        }

        function updateInputs() {
          const value = getSelectedAntennaType();

          setSectionVisible('div[id$="-tx"]', false);
          setSectionVisible('div[id$="-rx"]', false);

          if (value === "radio1") {
            setSectionVisible('div[id$="-tx"]', true);
          } else if (value === "radio2") {
            setSectionVisible('div[id$="-rx"]', true);
          } else if (value === "radio3") {
            setSectionVisible('div[id$="-tx"]', true);
            setSectionVisible('div[id$="-rx"]', true);
          }

          syncChannelFrequencyDefaults(value);
          applySatelliteOverrides();
          applyValidationToAllFields();
        }

        updateInputs();

        radios.addEventListener("change", updateInputs);
      });
    </script>
  </body>
</html>
