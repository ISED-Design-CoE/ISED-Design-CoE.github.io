<!doctype html>
<html dir="ltr" lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <meta name="description" content="Mockup." />

    <!-- TODO: Insert a concise, descriptive title that summarizes your page's content. -->
    <title>Site data upload CSV generator</title>

    <!-- GC Design System -->
    <link
      rel="stylesheet"
      href="https://cdn.design-system.alpha.canada.ca/@cdssnc/gcds-components@0.37.0/dist/gcds/gcds.css"
    />
    <script
      type="module"
      src="https://cdn.design-system.alpha.canada.ca/@cdssnc/gcds-components@0.37.0/dist/gcds/gcds.esm.js"
    ></script>
    <link
      rel="stylesheet"
      href="https://cdn.design-system.alpha.canada.ca/@cdssnc/gcds-utility@1.9.0/dist/gcds-utility.min.css"
    />
  </head>

  <body>
    <!---------- Header ---------->
    <!-- TODO: Modify the lang-href to set the language toggle's URL. -->
    <!-- TODO: Update the skip-to-href with the main content container's id. -->
    <gcds-header lang-href="#" skip-to-href="#main-content">
      <!-- The slot="search" attribute adds the search component to the header. -->
      <gcds-search slot="search"></gcds-search>

      <!-- The slot="breadcrumb" attribute adds the breadcrumbs component to the header. -->
      <gcds-breadcrumbs hide-canada-link="true" slot="breadcrumb">
        <!-- TODO: Adjust the breadcrumb links with the correct ones for your site. -->
        <gcds-breadcrumbs-item href="index.html"
          >Site data upload CSV generator</gcds-breadcrumbs-item
        >
      </gcds-breadcrumbs>
    </gcds-header>

    <!---------- Main content ---------->
    <!-- TODO: Confirm the id matches the "skip-to-href" id in the header. -->
    <gcds-container
      id="main-content"
      main-container
      size="xl"
      centered
      tag="main"
    >
      <section>
        <gcds-heading tag="h1">Site data upload CSV generator</gcds-heading>

        <gcds-heading tag="h2">Step 2: Station information</gcds-heading>

        <gcds-input
          input-id="station-location"
          label="Station location"
          hint="Enter a location for your station."
          size="63"
          required
          maxlength="63"
        ></gcds-input>

        <gcds-select
          select-id="radio-technology"
          label="Radio technology"
          name="Radio technology"
          hint="Enter the mode of operation (provisioning) for the radio apparatus at the site."
          required
          default-value="Select option"
        >
          <option value="1">
            GSM – Global System for Mobile Communications
          </option>
          <option value="2">CDMA – Code Division Multiple Access</option>
          <option value="3">HSPA – High Speed Packet Access</option>
          <option value="4">LTE – Long Term Evolution</option>
          <option value="5">5GNR – 5G New Radio</option>
          <option value="6">5GDSS – 5G Dynamic Spectrum Sharing</option>
          <option value="7">
            WIMAX – Worldwide Interoperability for Microwave Access
          </option>
          <option value="8">WI-FI</option>
          <option value="9">OTHER</option>
        </gcds-select>

        <gcds-input
          input-id="cell-id"
          label="Cell Global Identity (CGI)"
          hint="Enter the mobile network Cell Global Identity (CGI) following the 3GPP notation for the given radio technology above."
          required
          minlength="11"
          maxlength="27"
          pattern="\d{6}-\d{8}-\d{11}"
        ></gcds-input>

        <gcds-input
          input-id="physical-cell-id"
          label="Physical Cell ID"
          hint="Enter the Physical Cell Identity (PCI) for your LTE or 5G system."
          required
          type="number"
          size="4"
          maxlength="4"
          character-count
        ></gcds-input>

        <gcds-select
          select-id="province-territory"
          label="Province/Territory"
          name="Province/Territory"
          hint="What province or territory your station is located?"
          required
          default-value="Select option"
        >
          <option value="Alberta">AB - Alberta</option>
          <option value="British Columbia">BC - British Columbia</option>
          <option value="Manitoba">MB - Manitoba</option>
          <option value="New Brunswick">NB - New Brunswick</option>
          <option value="Newfoundland and Labrador">
            NL - Newfoundland and Labrador
          </option>
          <option value="Nova Scotia">NS - Nova Scotia</option>
          <option value="Ontario">ON - Ontario</option>
          <option value="Prince Edward Island">
            PE - Prince Edward Island
          </option>
          <option value="Quebec">QC - Quebec</option>
          <option value="Saskatchewan">SK - Saskatchewan</option>
          <option value="Northwest Territories">
            NT - Northwest Territories
          </option>
          <option value="Nunavut">NU - Nunavut</option>
          <option value="Yukon">YT - Yukon</option>
        </gcds-select>

        <gcds-input
          input-id="latitude"
          label="Latitude"
          hint="The latitude of the station, in decimal degrees."
          required
          min="41"
          max="91"
          type="number"
          size="11"
        ></gcds-input>

        <gcds-input
          input-id="longitude"
          label="Longitude"
          hint="The longitude of the station, in decimal degrees."
          required
          min="-141"
          max="-40"
          type="number"
          size="11"
        ></gcds-input>

        <gcds-select
          select-id="site-type"
          label="Site Type Code"
          name="Site Type"
          hint="Is your site outdoor, indoor, or underground?"
          required
          default-value="Select option"
        >
          <option value="1">U - Underground</option>
          <option value="2">O - Outdoor</option>
          <option value="3">I - Indoor</option>
        </gcds-select>

        <gcds-input
          input-id="structure-height"
          label="Structure Height"
          hint="The height of your station in meters."
          required
          min="1"
          max="600"
          type="number"
          size="4"
          oninput="this.value = this.value.slice(0, 3)"
        ></gcds-input>

        <gcds-select
          select-id="structure-type"
          label="Structure Type Code"
          name="Structure Type"
          hint="What kind of structure is your site fixed on?"
          required
          default-value="Select option"
        >
          <option value="1">T - Purpose-built tower</option>
          <option value="2">R - Outside of building or rooftop</option>
          <option value="3">
            P - Light pole, other street electrical, or utility pole
          </option>
          <option value="4">S - Water tower or farm silo</option>
          <option value="5">F - Furniture</option>
          <option value="6">
            M - Transportable (Report the current operating location only and
            not the radius of operation)
          </option>
          <option value="7">O - Other (E.g. indoor)</option>
        </gcds-select>

        <gcds-date-input
          input-id="date-of-modification"
          legend="Date of last modification"
          hint="The date that the installation went into service. This date helps investigate possible sources of technical issues."
          required
          name="props-default"
          format="full"
        >
        </gcds-date-input>

        <gcds-input
          input-id="site-record-id"
          label="Site record ID"
          hint="The identifier as defined by the licensee for the site or antenna installation."
          required
          type="number"
        ></gcds-input>

        <gcds-button button-role="secondary" id="btn-go-back">
          Go back
        </gcds-button>
        <gcds-button id="btn-next"> Next </gcds-button>
      </section>

      <!-- TODO: Update the date to reflect the page's most recent change. -->
      <gcds-date-modified>2026-04-01</gcds-date-modified>
    </gcds-container>

    <!---------- Footer ---------->
    <!-- TODO: Update or remove the contextual footer heading and links as needed. -->
    <gcds-footer
      display="full"
      contextual-heading="Innovation, Science and Economic Development"
      contextual-links='{ "Contact us": "#"}'
    >
    </gcds-footer>

    <script type="module">
      import {
        setCurrentPage,
        saveCurrentPageData,
        loadCurrentPageData,
        validateCurrentPage,
        applyValidationToAllFields,
      } from "./scripts/site-data-upload-csv.js";

      setCurrentPage(2);
      loadCurrentPageData(2);
      applyValidationToAllFields();

      const nextBtn = document.getElementById("btn-next");
      const backBtn = document.getElementById("btn-go-back");

      nextBtn?.addEventListener("click", (event) => {
        event.preventDefault();
        if (!validateCurrentPage()) return;
        saveCurrentPageData();
        window.location.href = "page3.html";
      });

      backBtn?.addEventListener("click", (event) => {
        event.preventDefault();
        saveCurrentPageData();
        window.location.href = "page1.html";
      });

      document.addEventListener("pointerup", (event) => {
        const path = event.composedPath ? event.composedPath() : [event.target];
        for (const node of path) {
          if (!(node instanceof Element)) continue;
          if (node === nextBtn || node === backBtn) continue;
          if (node.id === "btn-next" || node.closest?.("#btn-next")) {
            event.preventDefault();
            if (!validateCurrentPage()) return;
            saveCurrentPageData();
            window.location.href = "page3.html";
            return;
          }
          if (node.id === "btn-go-back" || node.closest?.("#btn-go-back")) {
            event.preventDefault();
            saveCurrentPageData();
            window.location.href = "page1.html";
            return;
          }
        }
      });
    </script>
  </body>
</html>
